<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bkre8tive Homelab — Network Topology</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0f19;--bg2:#111827;--bg3:#1a2336;--bg4:#1e293b;--border:#1e2d45;--border2:#2a3f5f;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--blue:#3B82F6;--green:#10B981;--purple:#8B5CF6;--amber:#F59E0B;--red:#EF4444;--pink:#EC4899;--slate:#64748B;--teal:#14B8A6}
body{background:var(--bg);color:var(--t1);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
.page{max-width:1280px;margin:0 auto;padding:32px 24px 48px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.h-brand{font-size:2rem;font-weight:700;letter-spacing:-.03em}.h-brand span{color:var(--blue)}
.h-sub{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--t3);margin-top:4px}
.dot-live{width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 8px #10B98166;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.h-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:4px 12px;border-radius:6px;border:1px solid var(--border2);color:var(--t2);background:var(--bg2)}
.legend{display:flex;flex-wrap:wrap;gap:12px 20px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:28px;align-items:center}
.leg{display:flex;align-items:center;gap:6px;font-size:.7rem;font-family:'JetBrains Mono',monospace;color:var(--t3)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.diagram-wrap{position:relative}
#svg-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
.center{display:flex;justify-content:center}
.gap-lg{height:36px}.gap-md{height:20px}
.divider{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--t4);position:relative;z-index:1}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:calc(50% - 140px);height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.node{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 20px;text-align:center;position:relative;z-index:1;min-width:160px;transition:border-color .2s,box-shadow .2s}
.node:hover{border-color:var(--border2)}
.node-bar{height:3px;border-radius:2px;margin:-8px -12px 10px;opacity:.6}
.node-glow{box-shadow:0 0 24px rgba(59,130,246,.1)}
.node-internet{border-radius:50%;width:140px;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border2);background:transparent}
.node-ico{font-size:1.5rem;margin-bottom:4px}.node-ico img{width:36px;height:36px;object-fit:contain}
.node-name{font-weight:600;font-size:.85rem}
.node-ip{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:2px}
.node-tag{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--t4);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.core-row{display:flex;justify-content:center;align-items:center;gap:0;flex-wrap:wrap;position:relative;z-index:1}
.core-connector{width:36px;height:2px;background:var(--border);position:relative;flex-shrink:0}
.core-connector::after{content:'';position:absolute;right:-3px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--border2)}
.vlan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;position:relative;z-index:1}
.vlan-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.vlan-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.vlan-head{display:flex;align-items:center;gap:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600}
.vtag{margin-left:auto;font-size:.6rem;opacity:.7;font-weight:400}
.vsub{font-size:.6rem;opacity:.5;font-weight:400}
.vlan-body{padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.dev{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.04);transition:background .2s}
.dev:hover{background:rgba(255,255,255,.03)}
.dev-ico{font-size:1rem;flex-shrink:0;width:24px;text-align:center}.dev-ico img{width:20px;height:20px;object-fit:contain;vertical-align:middle}
.dev-info{flex:1;min-width:0}.dev-name{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-ip{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-pill{font-family:'JetBrains Mono',monospace;font-size:.55rem;padding:2px 8px;border-radius:4px;font-weight:500;flex-shrink:0;letter-spacing:.03em}
.pill-phys{background:rgba(139,92,246,.12);color:#C4B5FD}.pill-vm{background:rgba(59,130,246,.12);color:#93C5FD}
.pill-svc{background:rgba(16,185,129,.12);color:#6EE7B7}.pill-nas{background:rgba(245,158,11,.12);color:#FCD34D}
.pill-docker{background:rgba(236,72,153,.12);color:#F9A8D4}.pill-gpu{background:rgba(239,68,68,.12);color:#FCA5A5}
.pill-tbd{background:rgba(100,116,139,.12);color:#94A3B8}.pill-wifi{background:rgba(168,85,247,.12);color:#C4B5FD}
.cloud-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;position:relative;z-index:1}
.cloud-node{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center;min-width:120px;transition:border-color .2s}
.cloud-node:hover{border-color:var(--border2)}
.footer{text-align:center;margin-top:40px;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t4)}.footer span{color:var(--t3)}
@media(max-width:900px){.vlan-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.vlan-grid{grid-template-columns:1fr}.core-row{flex-direction:column}.core-connector{width:2px;height:24px}}
</style>
</head>
<body>
<div class="page">
<div class="header" id="hdr"></div>
<div class="legend" id="leg"></div>
<div class="diagram-wrap" id="dw">
<svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
</svg>
<div class="center" style="position:relative;z-index:1"><div class="node node-internet" id="n-internet"></div></div>
<div class="gap-lg"></div>
<div class="divider">Core Infrastructure — OPNsense — Unifi</div>
<div class="gap-md"></div>
<div class="center" style="position:relative;z-index:1;margin-bottom:16px"><div class="node" id="n-modem" style="min-width:200px"></div></div>
<div style="height:16px"></div>
<div class="core-row" id="core-row"></div>
<div class="gap-lg"></div>
<div class="divider">VLAN Segments</div>
<div class="gap-md"></div>
<div class="vlan-grid" id="vlan-grid"></div>
<div class="gap-lg"></div>
<div class="divider">Cloud &amp; Remote Access</div>
<div class="gap-md"></div>
<div class="cloud-row" id="cloud-row"></div>
</div>
<div class="footer" id="ftr"></div>
</div>
<script>
function ico(file,fb){if(!file)return fb;return '<img src="icons/'+file+'" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle" onerror="this.outerHTML=\''+fb+'\'">';}
function icoLg(file,fb){if(!file)return fb;return '<img src="icons/'+file+'" alt="" style="max-height:36px;width:auto;max-width:48px;object-fit:contain" onerror="this.outerHTML=\''+fb+'\'">';}

const DATA={
site:{name:'bkre8tive Homelab',subtitle:'Network Topology',updated:'2026-04-17'},
internet:{name:'Internet',ip:'Spectrum — 1 Gbps',icon:'🌐'},
modem:{name:'Spectrum Modem',ip:'WAN Gateway',tag:'WAN GATEWAY',icon:'📡'},
core:[
{id:'n-fw',name:'OPNsense',ip:'10.10.10.1',tag:'Firewall — Router — VLAN',color:'#3B82F6',glow:true,iconFile:'opnsense.png',icon:'🛡️'},
{id:'n-sw',name:'USW-16-PoE',ip:'10.10.10.51',tag:'Managed Switch — 16 Port',color:'#3B82F6',glow:false,iconFile:'ubiquiti.png',icon:'🔀'},
{id:'n-ap',name:'U6 Pro',ip:'10.10.10.53',tag:'WiFi Access Point',color:'#10B981',glow:false,iconFile:'ubiquiti.png',icon:'📶'},
{id:'n-rpi',name:'Raspberry Pi 5',ip:'10.10.10.52',tag:'Unifi Controller — Twingate',color:'#3B82F6',glow:false,iconFile:'raspberry-pi.png',icon:'🍓'}
],
vlans:[
{id:'v10',name:'Mgmt Infrastructure',tag:'VLAN 10',subnet:'10.10.10.0/24',color:'#14B8A6',bg:'rgba(20,184,166,0.08)',border:'rgba(20,184,166,0.2)',pipeSpeed:1.5,
devices:[
{name:'prox-main',ip:'10.10.10.2 · Ryzen AI 9 HX 370',icon:ico('proxmox.png','🖥️'),pill:'PHYS',pc:'pill-phys'},
{name:'prox-node',ip:'10.10.10.3 · Intel i9-13900HK',icon:ico('proxmox.png','🖥️'),pill:'PHYS',pc:'pill-phys'},
{name:'prox-alien',ip:'10.10.10.4 · i9-12900H + RTX 3080',icon:ico('proxmox.png','🎮'),pill:'GPU',pc:'pill-gpu'},
{name:'Traefik Proxy',ip:'10.10.10.6 · Reverse Proxy',icon:ico('ubuntu.png','🔄'),pill:'DOCKER',pc:'pill-docker'},
{name:'HOME-NAS',ip:'10.10.10.13 · Synology DS923+',icon:ico('nas.png','🗄️'),pill:'NAS',pc:'pill-nas'},
{name:'PBS',ip:'10.10.10.50 · Proxmox Backup',icon:ico('ubuntu.png','💾'),pill:'VM',pc:'pill-vm'},
{name:'Ubuntu-Media',ip:'10.10.10.69 · Video transcription',icon:ico('ubuntu.png','🐧'),pill:'VM',pc:'pill-vm'},
{name:'mgmt-server',ip:'10.10.10.71 · labctl + lab-platform',icon:ico('ubuntu.png','🖥️'),pill:'VM',pc:'pill-vm'},
{name:'pgsrv01',ip:'10.10.10.72 · Local database',icon:ico('ubuntu.png','🗃️'),pill:'VM',pc:'pill-vm'}
]},
{id:'v20',name:'Home Network',tag:'VLAN 20',subnet:'10.10.20.0/24',color:'#3B82F6',bg:'rgba(59,130,246,0.08)',border:'rgba(59,130,246,0.2)',pipeSpeed:2,
devices:[
{name:'Amazon-PC',ip:'10.10.20.93 · Windows',icon:ico('windows.png','🪟'),pill:'VM',pc:'pill-vm'},
{name:'Media WinPC',ip:'10.10.20.250 · Power BI',icon:ico('windows.png','🪟'),pill:'VM',pc:'pill-vm'},
{name:'Jellyfin',ip:'10.10.20.37 · Media Server',icon:'🎬',pill:'SVC',pc:'pill-svc'},
{name:'RAXE500',ip:'10.10.20.60 · Netgear WiFi AP',icon:ico('wifi.png','📶'),pill:'WIFI',pc:'pill-wifi'},
{name:'Personal Devices',ip:'DHCP · Phones, tablets, Mac',icon:'📱',pill:'WIFI',pc:'pill-wifi'}
]},
{id:'v30',name:'Server Network',tag:'VLAN 30',subnet:'10.10.30.0/24',color:'#8B5CF6',bg:'rgba(139,92,246,0.08)',border:'rgba(139,92,246,0.2)',pipeSpeed:3.5,
devices:[
{name:'Docker Host',ip:'Planned · Container runtime',icon:'🐳',pill:'PLANNED',pc:'pill-tbd',dim:true},
{name:'Future Services',ip:'Not yet provisioned',icon:'⚙️',pill:'TBD',pc:'pill-tbd',dim:true}
]},
{id:'v40',name:'Guest Network',tag:'VLAN 40',subnet:'10.10.40.0/24',color:'#F59E0B',bg:'rgba(245,158,11,0.08)',border:'rgba(245,158,11,0.2)',pipeSpeed:3,
devices:[
{name:'Guest Devices',ip:'DHCP · Internet only · Isolated',icon:'👥',pill:'WIFI',pillColor:'rgba(245,158,11,0.12)',pillText:'#FCD34D'}
]},
{id:'v50',name:'IoT Network',tag:'VLAN 50',subnet:'10.10.50.0/24',color:'#EF4444',bg:'rgba(239,68,68,0.08)',border:'rgba(239,68,68,0.2)',pipeSpeed:3.5,
devices:[
{name:'Nest Doorbell',ip:'DHCP · Battery doorbell',icon:'🔔',pill:'IoT',pillColor:'rgba(239,68,68,0.12)',pillText:'#FCA5A5'},
{name:'Roborock',ip:'DHCP · Robot vacuum',icon:'🤖',pill:'IoT',pillColor:'rgba(239,68,68,0.12)',pillText:'#FCA5A5'},
{name:'Pura Diffusers',ip:'DHCP · Smart diffusers (x3)',icon:'🌸',pill:'IoT',pillColor:'rgba(239,68,68,0.12)',pillText:'#FCA5A5'}
]},
{id:'v60',name:'Development',tag:'VLAN 60',subnet:'10.10.60.0/24',color:'#EC4899',bg:'rgba(236,72,153,0.08)',border:'rgba(236,72,153,0.2)',pipeSpeed:2.5,
devices:[
{name:'Win-Son-GPU',ip:'10.10.60.51 · GPU workstation (JJ)',icon:ico('windows.png','💻'),pill:'GPU',pc:'pill-gpu'},
{name:'ai-agent-lab',ip:'In progress · Docker',icon:'🤖',pill:'WIP',pillColor:'rgba(236,72,153,0.12)',pillText:'#F9A8D4',dim:true}
]}
],
cloud:[
{id:'c-azure',name:'Azure',tag:'AZ-104 Lab',iconFile:'azure.png',icon:'☁️'},
{id:'c-twingate',name:'Twingate',tag:'Zero-Trust VPN',iconFile:'twingate.png',icon:'🔒'},
{id:'c-gcp',name:'Google Cloud',tag:'RustDesk Relay',iconFile:'gcp.png',icon:'🌩️'},
{id:'c-intune',name:'Intune',tag:'MDM · Lab',iconFile:'intune.png',icon:'🖥️'}
]};

document.getElementById('hdr').innerHTML='<div><div class="h-brand">'+DATA.site.name.replace('bkre8tive','bkre8<span>tive</span>')+'</div><div class="h-sub"><div class="dot-live"></div>'+DATA.site.subtitle+' — Last updated '+DATA.site.updated+'</div></div><div class="h-badges"><span class="badge">OPNsense</span><span class="badge">Proxmox Cluster</span><span class="badge">'+DATA.vlans.length+' VLANs</span></div>';

document.getElementById('leg').innerHTML=DATA.vlans.map(function(v){return '<div class="leg"><div class="leg-dot" style="background:'+v.color+'"></div>'+v.tag+' — '+v.name+'</div>';}).join('')+'<div class="leg" style="margin-left:auto"><svg width="28" height="8" style="flex-shrink:0"><line x1="0" y1="4" x2="28" y2="4" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 5"/></svg>Animated Data Flow</div>';

document.getElementById('n-internet').innerHTML='<div class="node-ico">'+DATA.internet.icon+'</div><div class="node-name">'+DATA.internet.name+'</div><div class="node-ip">'+DATA.internet.ip+'</div>';

document.getElementById('n-modem').innerHTML='<div class="node-bar" style="background:#64748B"></div><div class="node-ico">'+DATA.modem.icon+'</div><div class="node-name">'+DATA.modem.name+'</div><div class="node-ip">'+DATA.modem.ip+'</div><div class="node-tag">'+DATA.modem.tag+'</div>';

document.getElementById('core-row').innerHTML=DATA.core.map(function(n,i){
var gc=n.glow?' node-glow':'';
var bar=n.color?'<div class="node-bar" style="background:'+n.color+'"></div>':'';
var ic=n.iconFile?'<div class="node-ico">'+icoLg(n.iconFile,n.icon)+'</div>':'<div class="node-ico">'+n.icon+'</div>';
var cn=i<DATA.core.length-1?'<div class="core-connector"></div>':'';
return '<div class="node'+gc+'" id="'+n.id+'">'+bar+ic+'<div class="node-name">'+n.name+'</div><div class="node-ip">'+n.ip+'</div><div class="node-tag">'+n.tag+'</div></div>'+cn;
}).join('');

document.getElementById('vlan-grid').innerHTML=DATA.vlans.map(function(v){
var ds=v.devices.map(function(d){
var st=d.dim?'opacity:.45;border-style:dashed':'';
var pl=d.pc?'<span class="dev-pill '+d.pc+'">'+d.pill+'</span>':'<span class="dev-pill" style="background:'+d.pillColor+';color:'+d.pillText+'">'+d.pill+'</span>';
return '<div class="dev" style="'+st+'"><div class="dev-ico">'+d.icon+'</div><div class="dev-info"><div class="dev-name">'+d.name+'</div><div class="dev-ip">'+d.ip+'</div></div>'+pl+'</div>';
}).join('');
return '<div class="vlan-card" id="'+v.id+'"><div class="vlan-head" style="background:'+v.bg+';color:'+v.color+';border-bottom:1px solid '+v.border+'"><span>●</span>'+v.name+'<span class="vtag">'+v.tag+'</span><span class="vsub">'+v.subnet+'</span></div><div class="vlan-body">'+ds+'</div></div>';
}).join('');

document.getElementById('cloud-row').innerHTML=DATA.cloud.map(function(c){var ci=c.iconFile?icoLg(c.iconFile,c.icon):c.icon;return '<div class="cloud-node" id="'+c.id+'"><div class="node-ico">'+ci+'</div><div class="node-name">'+c.name+'</div><div class="node-tag">'+c.tag+'</div></div>';}).join('');

document.getElementById('ftr').innerHTML='Save to: <span>01_Homelab/04_Diagrams/network-topology.html</span> &middot; '+DATA.site.updated+' &middot; '+DATA.site.name;

var svg=document.getElementById('svg-canvas'),dw=document.getElementById('dw');
function rc(id){var el=document.getElementById(id);if(!el)return null;var wr=dw.getBoundingClientRect(),er=el.getBoundingClientRect();return{x:er.left-wr.left+er.width/2,y:er.top-wr.top+er.height/2,t:er.top-wr.top,b:er.top-wr.top+er.height,l:er.left-wr.left,r:er.left-wr.left+er.width};}
var pid=0;
function pipe(x1,y1,x2,y2,col,dur,straight){
var id='pp'+(pid++),mx=(x1+x2)/2;
var d=straight?'M'+x1+','+y1+' L'+x2+','+y2:'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
var g=document.createElementNS('http://www.w3.org/2000/svg','g');
var gp=document.createElementNS('http://www.w3.org/2000/svg','path');
gp.setAttribute('d',d);gp.setAttribute('fill','none');gp.setAttribute('stroke',col);gp.setAttribute('stroke-width','4');gp.setAttribute('opacity','0.07');gp.setAttribute('filter','url(#glow)');
var dp=document.createElementNS('http://www.w3.org/2000/svg','path');
dp.setAttribute('d',d);dp.setAttribute('id',id);dp.setAttribute('fill','none');dp.setAttribute('stroke',col);dp.setAttribute('stroke-width','1.5');dp.setAttribute('stroke-dasharray','5 13');dp.setAttribute('opacity','0.6');
var a=document.createElementNS('http://www.w3.org/2000/svg','animate');
a.setAttribute('attributeName','stroke-dashoffset');a.setAttribute('from','180');a.setAttribute('to','0');a.setAttribute('dur',dur+'s');a.setAttribute('repeatCount','indefinite');dp.appendChild(a);
var pk=document.createElementNS('http://www.w3.org/2000/svg','circle');
pk.setAttribute('r','3');pk.setAttribute('fill',col);pk.setAttribute('filter','url(#glow)');
var am=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
am.setAttribute('dur',dur+'s');am.setAttribute('repeatCount','indefinite');
var mp=document.createElementNS('http://www.w3.org/2000/svg','mpath');
mp.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href','#'+id);am.appendChild(mp);
var af=document.createElementNS('http://www.w3.org/2000/svg','animate');
af.setAttribute('attributeName','opacity');af.setAttribute('values','0;0;1;1;0');af.setAttribute('keyTimes','0;0.05;0.1;0.9;1');af.setAttribute('dur',dur+'s');af.setAttribute('repeatCount','indefinite');
pk.appendChild(am);pk.appendChild(af);g.appendChild(gp);g.appendChild(dp);g.appendChild(pk);svg.appendChild(g);
}
function draw(){
while(svg.children.length>1)svg.removeChild(svg.lastChild);pid=0;
var I=rc('n-internet'),M=rc('n-modem'),FW=rc('n-fw'),SW=rc('n-sw'),AP=rc('n-ap'),RP=rc('n-rpi');
if(!I||!M||!FW)return;
pipe(I.x,I.b,M.x,M.t,'#3B82F6',1.3,true);
pipe(M.x,M.b,FW.x,FW.t,'#3B82F6',1.5,true);
if(SW)pipe(FW.r,FW.y,SW.l,SW.y,'#3B82F6',1.8,false);
if(SW&&AP)pipe(SW.r,SW.y,AP.l,AP.y,'#10B981',2.2,false);
if(AP&&RP)pipe(AP.r,AP.y,RP.l,RP.y,'#3B82F6',2.8,false);
DATA.vlans.forEach(function(v){var vn=rc(v.id);if(!vn)return;var src=SW;if(!src)return;pipe(src.x,src.b,vn.x,vn.t,v.color,v.pipeSpeed,false);});
var offsets=[-75,-25,25,75];
DATA.cloud.forEach(function(c,i){var cn=rc(c.id);if(!cn||!FW)return;pipe(FW.x+(offsets[i]||0),FW.b,cn.x,cn.t,'#64748B',4+i*0.4,false);});
}
function resize(){var r=dw.getBoundingClientRect();svg.setAttribute('width',r.width);svg.setAttribute('height',r.height);svg.style.cssText='width:'+r.width+'px;height:'+r.height+'px';}
function init(){resize();draw();}
setTimeout(init,300);
window.addEventListener('resize',function(){setTimeout(init,100);});
</script>
</body>
</html>
